name: riftbench

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - traefik-letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: migrate
      args:
        DOTNET_VERSION: ${DOTNET_VERSION:-10.0}
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - jobs

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
      target: ingest
      args:
        DOTNET_VERSION: ${DOTNET_VERSION:-10.0}
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    profiles:
      - jobs

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
      args:
        DOTNET_VERSION: ${DOTNET_VERSION:-10.0}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      WebBase: ${WEB_BASE}
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=riftbench_proxy
      - traefik.http.services.riftbench-api.loadbalancer.server.port=8080
      - traefik.http.routers.riftbench-api.rule=Host(`${API_HOST}`)
      - traefik.http.routers.riftbench-api.entrypoints=websecure
      - traefik.http.routers.riftbench-api.tls.certresolver=letsencrypt

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: web
      args:
        NODE_VERSION: ${NODE_VERSION:-24}
        DOTNET_VERSION: ${DOTNET_VERSION:-10.0}
        VITE_API_BASE: ${VITE_API_BASE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      VITE_API_BASE: ${VITE_API_BASE}
    depends_on:
      - api
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=riftbench_proxy
      - traefik.http.services.riftbench-web.loadbalancer.server.port=3000
      - traefik.http.routers.riftbench-web.rule=Host(`${WEB_HOST}`)
      - traefik.http.routers.riftbench-web.entrypoints=websecure
      - traefik.http.routers.riftbench-web.tls.certresolver=letsencrypt

volumes:
  postgres-data:
  traefik-letsencrypt:

networks:
  internal:
  proxy:
