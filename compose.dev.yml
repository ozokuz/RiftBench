name: riftbench-dev

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riftbench}
      POSTGRES_USER: ${POSTGRES_USER:-riftbench}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riftbench}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-dev-data:
